<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Artículo — Precios últimos 12 meses</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        .product-page{max-width:1100px;margin:2rem auto;padding:1rem;display:grid;grid-template-columns:1fr 360px;gap:1rem}
        .product-hero{display:flex;gap:1rem;align-items:center}
        .product-hero img{width:140px;height:140px;object-fit:cover;border-radius:8px}
        .chart-wrap{background:transparent;padding:0.6rem;border-radius:8px}
        @media(max-width:900px){.product-page{grid-template-columns:1fr;}.chart-wrap{order:2}}
    </style>
</head>
<body>
    <header>
        <div class="logo-nav"><a href="index.html" style="text-decoration:none;color:inherit;font-weight:700">← Volver</a></div>
    </header>
    <main>
        <section class="product-page">
            <div>
                <div class="product-hero">
                    <img id="productImg" src="images/basketball.jpg" alt="Producto">
                    <div>
                        <h1 id="productTitle">Artículo</h1>
                        <div id="currentPrice" style="font-size:1.4rem;font-weight:800;margin-top:.3rem">€0.00</div>
                        <div id="priceChange" style="margin-top:.3rem;color:#4a4a4a"></div>
                    </div>
                </div>

                <div class="chart-wrap">
                    <canvas id="priceChart" height="200"></canvas>
                </div>
            </div>

            <aside class="price-panel">
                <div class="price-summary">
                    <div>
                        <div style="font-size:.9rem;color:#666">Últimos 12 meses</div>
                        <div id="summaryMax" style="font-size:1rem;font-weight:800">Max €0</div>
                        <div id="summaryMin" style="color:#666">Min €0</div>
                    </div>
                    <div style="text-align:right">
                        <div style="font-size:.9rem;color:#666">Último precio</div>
                        <div id="summaryLast" style="font-size:1.2rem;font-weight:800">€0</div>
                    </div>
                </div>

                <div class="price-history-list" id="priceHistory"></div>
            </aside>
        </section>
    </main>

    <script src="js/product.js" defer></script>
</body>
</html>
